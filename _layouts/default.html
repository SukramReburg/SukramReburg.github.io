<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title and page.title != "Overview" %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}" />
    <meta property="og:title" content="{% if page.title and page.title != 'Overview' %}{{ page.title }} · {% endif %}{{ site.title }}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
  </head>

  <body class="{% if page.url == '/' %}page-home{% else %}page-detail{% endif %}">
    <div class="site-shell">
      {% include nav.html %}

      {% if page.url == '/' %}
      <main id="top" class="site-main">
        {{ content }}
      </main>
      {% else %}
      <main class="site-main">
        <section class="subpage-hero section-shell">
          <div class="subpage-hero__eyebrow">Project Detail</div>
          <h1 class="subpage-hero__title">{{ page.title }}</h1>
        </section>

        <article class="detail-article section-shell reveal">
          {{ content }}
        </article>
      </main>
      {% endif %}
    </div>

    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
